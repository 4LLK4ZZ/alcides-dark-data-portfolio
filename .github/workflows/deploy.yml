name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Usando o Bun para compilar o ecossistema do Lovable mais rápido
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: |
          bun run build
          # Script inteligente para garantir o index.html e o 404.html no lugar certo
          if [ -d "dist/client" ]; then
            cp dist/client/index.html dist/client/404.html
            mv dist/client/* dist/ 2>/dev/null || true
          else
            cp dist/index.html dist/404.html
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # O robô vai ler direto a pasta dist unificada

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4